version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: "us-east-2"
    AWS_ACCOUNT_ID: "992382749898"
    IMAGE_REPO_NAME: "nodejs-practice"
    # --- UPDATE THESE THREE VARIABLES BEFORE PUSHING ---
    S3_BUCKET: "jenkins-cicd-docker"       # The S3 bucket you selected in the CodeBuild setup
    EB_APP_NAME: "Nodejs-Docker-App"       # The Application name you created in Beanstalk
    EB_ENV_NAME: "Nodejs-Docker-App-env"     # The Environment name generated by Beanstalk
    # ---------------------------------------------------

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - REPOSITORY_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME
  build:
    commands:
      - echo Build started on `date`
      - echo Building the Docker image...
      - docker build -t $IMAGE_REPO_NAME:latest .
      - docker tag $IMAGE_REPO_NAME:latest $REPOSITORY_URI:latest
  post_build:
    commands:
      - echo Build completed on `date`
      - echo Pushing the Docker image to ECR...
      - docker push $REPOSITORY_URI:latest
      
      - echo Writing deployment file for Elastic Beanstalk...
      - printf '{"AWSEBDockerrunVersion":"1","Image":{"Name":"%s","Update":"true"},"Ports":[{"ContainerPort":"80"}]}' $REPOSITORY_URI:latest > Dockerrun.aws.json
      
      - echo Zipping the Dockerrun file...
      - zip -r Dockerrun.zip Dockerrun.aws.json
      
      - echo Uploading to S3...
      - aws s3 cp Dockerrun.zip s3://$S3_BUCKET/Dockerrun.zip
      
      - echo Creating new Elastic Beanstalk Application Version...
      # We use $CODEBUILD_BUILD_NUMBER to give every deployment a unique version ID automatically
      - aws elasticbeanstalk create-application-version --application-name "$EB_APP_NAME" --version-label $CODEBUILD_BUILD_NUMBER --source-bundle S3Bucket="$S3_BUCKET",S3Key="Dockerrun.zip"
      
      - echo Updating Elastic Beanstalk Environment...
      - aws elasticbeanstalk update-environment --environment-name "$EB_ENV_NAME" --version-label $CODEBUILD_BUILD_NUMBER

artifacts:
  files:
    - Dockerrun.aws.json
    - Dockerrun.zip